[pytest]
# Configuración de pytest para el proyecto LLM Price Performance
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
# Silenciar warnings de terceros que no afectan los resultados
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
 
