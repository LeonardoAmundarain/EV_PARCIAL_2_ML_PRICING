version: "3.9"

services:

  # ── API FastAPI ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: llm_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: llm_pricing
      MONGO_COL: modelos
      CSV_PATH: /app/datos/llm_price_performance_tracker_2026-03-31.csv

  # ── Dashboard Streamlit ──────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: llm_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api